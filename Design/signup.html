<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitCore — Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --card:      #161c26;
      --input-bg:  #1c2433;
      --border:    #243040;
      --teal:      #2dd4bf;
      --teal-glow: rgba(45, 212, 191, 0.18);
      --teal-btn:  linear-gradient(135deg, #2dd4bf 0%, #14b8a6 100%);
      --text:      #e8edf3;
      --muted:     #6b7a90;
      --error:     #f87171;
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      padding: 24px 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(45,212,191,0.12) 0%, transparent 70%);
      top: -100px; right: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(20,184,166,0.08) 0%, transparent 70%);
      bottom: -80px; left: -80px;
    }

    .page-wrapper {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Back arrow */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--teal);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 28px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .back-btn:hover { opacity: 0.75; }
    .back-btn svg { width: 18px; height: 18px; }

    /* Hero section */
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 28px;
      gap: 12px;
    }

    .hero-text { flex: 1; }

    .hero-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(26px, 6vw, 32px);
      font-weight: 800;
      line-height: 1.15;
      color: #fff;
      margin-bottom: 10px;
    }
    .hero-text h1 .brand { color: var(--teal); }

    .hero-text p {
      font-size: 13.5px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* Runner illustration */
    .hero-illo {
      width: 130px;
      height: 130px;
      flex-shrink: 0;
      position: relative;
    }

    .hero-illo .circle-bg {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #1a3a38 0%, #0f2625 100%);
      position: absolute;
      top: 0; right: 0;
    }

    .hero-illo svg.runner {
      position: absolute;
      bottom: 0;
      right: 4px;
      width: 100px;
      height: 115px;
      filter: drop-shadow(0 4px 16px rgba(45,212,191,0.25));
    }

    /* Stars decoration */
    .star {
      position: absolute;
      color: var(--teal);
      font-size: 10px;
      animation: twinkle 2.5s infinite ease-in-out;
    }
    .star:nth-child(1) { top: 10px; left: -8px; animation-delay: 0s; }
    .star:nth-child(2) { top: 2px; right: 14px; animation-delay: 0.8s; font-size: 8px; }
    .star:nth-child(3) { bottom: 20px; left: 4px; animation-delay: 1.6s; font-size: 7px; }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.4); }
    }

    /* Feature pills */
    .features {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
    }

    .feat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
      font-size: 11.5px;
      color: var(--muted);
      font-weight: 500;
      text-align: center;
      padding: 0 8px;
      border-right: 1px solid var(--border);
      animation: fadeUp 0.6s ease both;
    }
    .feat:last-child { border-right: none; }
    .feat:nth-child(1) { animation-delay: 0.1s; }
    .feat:nth-child(2) { animation-delay: 0.2s; }
    .feat:nth-child(3) { animation-delay: 0.3s; }

    .feat-icon {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--teal);
    }
    .feat-icon svg { width: 17px; height: 17px; }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px 24px;
      margin-bottom: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      animation: fadeUp 0.65s ease both;
      animation-delay: 0.15s;
    }

    /* Form groups */
    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap .icon {
      position: absolute;
      left: 14px;
      color: var(--muted);
      width: 17px;
      height: 17px;
      pointer-events: none;
      transition: color 0.2s;
    }

    .input-wrap input {
      width: 100%;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px 13px 42px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .input-wrap input::placeholder { color: var(--muted); }

    .input-wrap input:focus {
      border-color: var(--teal);
      background: #1e2d3d;
      box-shadow: 0 0 0 3px var(--teal-glow);
    }
    .input-wrap input:focus + .icon,
    .input-wrap:focus-within .icon { color: var(--teal); }

    /* Make icon order work with absolute positioning */
    .input-wrap .icon { z-index: 1; }

    .input-wrap input:focus ~ .icon { color: var(--teal); }

    /* Fix icon coloring on focus */
    .input-wrap:focus-within .icon { color: var(--teal); }

    .toggle-pw {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      transition: color 0.2s;
      padding: 0;
    }
    .toggle-pw:hover { color: var(--teal); }
    .toggle-pw svg { width: 17px; height: 17px; }

    /* Password strength hints */
    .pw-hints {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .hint {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11.5px;
      color: var(--muted);
      transition: color 0.25s;
    }
    .hint svg { width: 14px; height: 14px; }
    .hint.valid { color: var(--teal); }
    .hint.valid svg { stroke: var(--teal); }

    /* Checkbox */
    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 6px;
      margin-bottom: 20px;
    }

    .checkbox-row input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: var(--teal);
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      border-radius: 4px;
    }

    .checkbox-row span {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .checkbox-row a {
      color: var(--teal);
      text-decoration: none;
      font-weight: 500;
    }
    .checkbox-row a:hover { text-decoration: underline; }

    /* Submit button */
    .btn-create {
      width: 100%;
      background: var(--teal-btn);
      color: #0d1117;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      padding: 15px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      letter-spacing: 0.02em;
      transition: transform 0.15s, box-shadow 0.2s, filter 0.2s;
      box-shadow: 0 4px 24px rgba(45,212,191,0.35);
    }

    .btn-create:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(45,212,191,0.45);
      filter: brightness(1.06);
    }
    .btn-create:active { transform: translateY(0); }
    .btn-create svg { width: 18px; height: 18px; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 16px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Social buttons */
    .socials {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    .btn-social {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 11px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }
    .btn-social:hover {
      border-color: var(--teal);
      background: var(--input-bg);
      transform: translateY(-2px);
    }
    .btn-social svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Footer text */
    .footer-text {
      text-align: center;
      font-size: 13.5px;
      color: var(--muted);
    }
    .footer-text a {
      color: var(--teal);
      text-decoration: none;
      font-weight: 600;
    }
    .footer-text a:hover { text-decoration: underline; }

    /* Shake animation on error */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%  { transform: translateX(-6px); }
      40%  { transform: translateX(6px); }
      60%  { transform: translateX(-4px); }
      80%  { transform: translateX(4px); }
    }
    .shake { animation: shake 0.4s ease; }

    /* Success state */
    .btn-create.success {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      box-shadow: 0 4px 24px rgba(16,185,129,0.4);
    }
    .card-title {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 700;

  margin-bottom: 18px;
  padding-left: 4px;

  /* gradient text */
  background: linear-gradient(90deg, #2dd4bf, #14b8a6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  /* subtle glow */
  text-shadow: 0 0 12px rgba(45, 212, 191, 0.25);

  position: relative;
}

/* underline accent */
.card-title::after {
  content: "";
  position: absolute;
  left: 4px;
  bottom: -6px;

  width: 40px;
  height: 3px;
  border-radius: 10px;

  background: linear-gradient(90deg, #2dd4bf, transparent);
}

    .logo {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: contain;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<div class="page-wrapper">

<div class="card-title">
  Create Account
  <img src="logo.png" alt="FitCore Logo" class="logo" />
</div>

  <!-- Card -->
  <div class="card" id="signupCard">

    <!-- Full Name -->
    <div class="form-group">
      <label for="fullName">Full Name</label>
      <div class="input-wrap">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <input type="text" id="fullName" placeholder="Enter your full name" autocomplete="name" />
      </div>
    </div>

    <!-- Phone -->
    <div class="form-group">
      <label for="phone">Phone Number</label>
      <div class="input-wrap">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/>
        </svg>
        <input type="phone" id="phone" placeholder="Enter your phone number" autocomplete="tel" />
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <input type="password" id="password" placeholder="Create a password" autocomplete="new-password" />
        <button class="toggle-pw" type="button" onclick="togglePw('password', this)" aria-label="Show password">
          <svg id="eye-pw" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Terms -->
    <div class="checkbox-row">
      <input type="checkbox" id="terms" />
      <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
    </div>

    <!-- Submit -->
    <button class="btn-create" id="createBtn" onclick="handleSubmit()">
      <span id="btnText">Create Account</span>
      <svg id="btnIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </div>

  <!-- Social -->
  <div class="divider">or sign up with</div>

  <div class="socials">
    <!-- Google -->
    <button class="btn-social" onclick="socialLogin('Google')">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Google
    </button>

    <!-- Apple -->
    <button class="btn-social" onclick="socialLogin('Apple')">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.32.07 2.22.74 2.98.8 1.13-.23 2.2-.93 3.39-.84 1.44.12 2.52.71 3.22 1.84-2.93 1.81-2.43 5.85.42 6.98-.5 1.45-1.14 2.88-2.01 4.1zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
      </svg>
      Apple
    </button>

    <!-- Facebook -->
    <button class="btn-social" onclick="socialLogin('Facebook')">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="11" fill="#1877F2"/>
        <path d="M15.5 8H13V6.5c0-.6.4-.75.7-.75H15V3.5l-2.7-.1C9.9 3.4 9 5.2 9 6.7V8H7v2.5h2V20h3.5v-9.5H15l.5-2.5z" fill="white"/>
      </svg>
      Facebook
    </button>
  </div>

  <!-- Footer -->
  <p class="footer-text">Already have an account? <a href="#">Log In</a></p>

</div>

<script>
  // Password visibility toggle
  function togglePw(id, btn) {
    const input = document.getElementById(id);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.innerHTML = isHidden
      ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:17px;height:17px">
           <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
           <line x1="1" y1="1" x2="23" y2="23"/>
         </svg>`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:17px;height:17px">
           <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>
         </svg>`;
  }

  // Real-time password hints
  document.getElementById('password').addEventListener('input', function () {
    const v = this.value;
    toggle('h-len', v.length >= 8);
    toggle('h-num', /\d/.test(v));
    toggle('h-spc', /[!@#$%^&*()_+\-=\[\]{}|;':",.<>?/\\`~]/.test(v));
  });

  function toggle(id, valid) {
    document.getElementById(id).classList.toggle('valid', valid);
  }

  // Form submission
  function handleSubmit() {
    const name    = document.getElementById('fullName').value.trim();
    const email   = document.getElementById('email').value.trim();
    const pw      = document.getElementById('password').value;
    const cpw     = document.getElementById('confirmPassword').value;
    const terms   = document.getElementById('terms').checked;
    const card    = document.getElementById('signupCard');

    if (!name || !email || !pw || !cpw || !terms) {
      card.classList.remove('shake');
      void card.offsetWidth;
      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 450);
      return;
    }

    if (pw !== cpw) {
      const cpwInput = document.getElementById('confirmPassword');
      cpwInput.style.borderColor = 'var(--error)';
      setTimeout(() => cpwInput.style.borderColor = '', 1500);
      return;
    }

    const btn = document.getElementById('createBtn');
    const txt = document.getElementById('btnText');
    const ico = document.getElementById('btnIcon');

    btn.disabled = true;
    txt.textContent = 'Creating account…';
    ico.innerHTML = `<circle cx="12" cy="12" r="10" stroke="rgba(0,0,0,0.2)" stroke-width="3" fill="none"/>
      <path d="M12 2a10 10 0 010 20" stroke="#0d1117" stroke-width="3" stroke-linecap="round" fill="none">
        <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="0.8s" repeatCount="indefinite"/>
      </path>`;

    setTimeout(() => {
      btn.classList.add('success');
      txt.textContent = 'Account Created!';
      ico.innerHTML = `<polyline points="20 6 9 17 4 12" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    }, 1800);
  }

  // Social login placeholder
  function socialLogin(provider) {
    console.log('Social login:', provider);
  }
</script>

</body>
</html>
