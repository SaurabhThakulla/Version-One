<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Progress">
  <title>Progress</title>

  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="#0D1F17"/>

  <!-- Subtle glow ring -->
  <rect width="64" height="64" rx="14" fill="none" stroke="#39FF8A" stroke-width="0.8" opacity="0.25"/>

  <!-- Bar tracks -->
  <rect x="10" y="12" width="12" height="38" rx="4" fill="#1A3328" opacity="0.9"/>
  <rect x="26" y="12" width="12" height="38" rx="4" fill="#1A3328" opacity="0.9"/>
  <rect x="42" y="12" width="12" height="38" rx="4" fill="#1A3328" opacity="0.9"/>

  <!-- Filled bars -->
  <rect x="10" y="30" width="12" height="20" rx="4" fill="#39FF8A"/>
  <rect x="26" y="18" width="12" height="32" rx="4" fill="#00E5B0"/>
  <rect x="42" y="24" width="12" height="26" rx="4" fill="#A3FF6F"/>

  <!-- Shine dot on tallest bar -->
  <circle cx="32" cy="21" r="2" fill="#EAFFF5" opacity="0.7"/>

  <!-- Baseline -->
  <line x1="6" y1="53" x2="58" y2="53" stroke="#39FF8A" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
</svg>
